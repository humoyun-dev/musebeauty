# Alembic konfiguratsiyasi.
# Ulanish satri (sqlalchemy.url) shu yerda QO'YILMAYDI — alembic/env.py uni
# app.core.config.settings dan oladi (yagona manba, .env).

[alembic]
script_location = alembic
prepend_sys_path = .
# Migratsiya fayl nomi: 2025_01_01_1230-<rev>_<slug>.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
timezone = Asia/Tashkent

[post_write_hooks]

# ─── Logging ───
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
